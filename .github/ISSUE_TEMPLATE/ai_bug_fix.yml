name: 🐛 Bug Report (AI Fixable)
description: 报告一个 Bug，适合让 AI 自动修复
title: "[Bug] "
labels: ["bug", "ai-fix"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🤖 AI 自动修复 Bug 报告
        填写以下信息，AI 将自动尝试修复此 Bug 并提交 PR。

  - type: textarea
    id: description
    attributes:
      label: "Bug 描述"
      description: "清晰描述 Bug 的表现"
      placeholder: "例如：点击登录按钮后，页面没有任何反应，控制台出现 TypeError..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "复现步骤"
      description: "逐步描述如何复现（越详细，AI 修复越准确）"
      placeholder: |
        1. 打开页面 /xxx
        2. 输入...
        3. 点击...
        4. 观察到错误...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "期望行为"
      description: "描述正确情况下应该发生什么"
      placeholder: "期望点击按钮后跳转到主页并显示登录成功提示..."

  - type: textarea
    id: context
    attributes:
      label: "相关文件/代码位置"
      description: "如果你知道问题可能出在哪个文件或函数，请指出（可选）"
      placeholder: "可能在 src/auth/login.ts 的 handleSubmit 函数中..."

  - type: textarea
    id: logs
    attributes:
      label: "错误日志/截图"
      description: "粘贴相关的错误日志、堆栈信息或截图（可选）"
      placeholder: "```\nTypeError: Cannot read property 'xxx' of undefined\n    at handleSubmit (login.ts:42)\n```"

  - type: input
    id: version
    attributes:
      label: "版本"
      description: "使用的版本号或分支"
      placeholder: "v0.1.0 或 main"