name: 🤖 AI Fix Review

# ============================================================
# AI 自动修复审查意见（Claude Code CLI 执行）
# ============================================================
# 触发: AI Review 不通过 / 评论 /ai-fix-review
# 流程: Claude Code 读审查意见 → 修复严重问题 → 推送 → 重新审查
# ============================================================

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix-review:
    if: |
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'changes_requested') ||
      (github.event_name == 'issue_comment' &&
       github.event.comment.body == '/ai-fix-review' &&
       contains(github.event.issue.pull_request, 'true') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))

    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_HAIKU_MODEL }}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_OPUS_MODEL }}
      CLAUDE_CODE_DISABLE_1M_CONTEXT: "0"
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 安装 Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: 🔧 配置 Git
        run: |
          git config user.name "🤖 AI Bot"
          git config user.email "ai-bot@github-actions.com"

      - name: 🔍 提取 PR 编号
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Claude Code 修复审查意见
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          claude -p "
          你是一个代码修复专家。PR #$PR_NUMBER 的 AI 代码审查未通过，请修复严重问题。

          1. 获取 PR 信息和审查意见：
             gh pr view $PR_NUMBER --repo ${{ github.repository }} --json title,headRefName,reviews
             gh pr diff $PR_NUMBER --repo ${{ github.repository }}

          2. 找到最新的 AI 审查意见（github-actions 提交的 Review），提取 CRITICAL 和 HIGH 级别的问题。

          3. 切换到 PR 分支：
             BRANCH=\$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
             git fetch origin \$BRANCH
             git checkout \$BRANCH

          4. 检查修复轮数：
             如果 git log 中已有 2 个以上 'fix: AI review fix' 提交，则停止修复并评论提示人工介入。

          5. 修复 CRITICAL 和 HIGH 级别的问题。

          6. 提交并推送：
             git add .
             git commit -m 'fix: AI review fix - <简要描述>'
             git push origin \$BRANCH

          7. 在 PR 中评论修复摘要。

          ⚠️ 最多修复 2 轮，防止死循环。
          ⚠️ 只修复 CRITICAL 和 HIGH 问题。
          ⚠️ 只响应 AI 自己的 Review。
          " \
            --allowedTools "Read,Write,Edit,Bash(git:*),Bash(gh:*),Glob,Grep" \
            --output-format text \
            --verbose