name: Manual Publish to PyPI

on:
  workflow_dispatch:  # 手动触发
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi  # 后面要在 GitHub 里建这个 environment
    permissions:
      id-token: write  # 必须，用于 OIDC 认证
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build package
        run: |
          python -m build  # 生成 dist/ 下的 .whl 和 .tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1